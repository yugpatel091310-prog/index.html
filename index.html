<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yug's Private Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen" class="container">
        <div class="glass-card">
            <h2 id="auth-title" style="color: #6C63FF;">Welcome</h2>
            <p id="auth-subtitle">Login to start chatting</p>
            
            <input type="text" id="login-username" placeholder="Username">
            
            <div class="password-container" style="position:relative;">
                <input type="password" id="login-password" placeholder="Password" style="width:100%; box-sizing:border-box;">
                <button type="button" onclick="toggleView()" style="position:absolute; right:10px; top:20px; background:none; border:none; cursor:pointer;">👁️</button>
            </div>
            
            <button id="auth-btn" class="main-btn" onclick="handleAuth()">Login</button>
            
            <p style="margin-top: 15px; font-size: 14px;">
                <span id="toggle-text">Don't have an account?</span> 
                <a href="#" id="toggle-link" onclick="toggleAuthMode()" style="color: #6C63FF; text-decoration: none; font-weight: bold;">Sign Up</a>
            </p>
        </div>
    </div>

    <div id="chat-screen" class="container chat-layout" style="display:none;">
        <div class="header">
            <h3 style="margin:0; font-size:16px;">👤 <span id="user-tag"></span></h3>
            <div>
                <button id="admin-gate" style="display:none; border:none; background:none; cursor:pointer; font-size:18px;" onclick="openAdmin()">⚙️</button>
                <button onclick="location.reload()" style="border:none; color:red; background:none; cursor:pointer; font-weight:bold;">Exit</button>
            </div>
        </div>
        
        <div id="messages-display"></div>

        <div class="input-area">
            <label for="img-input" style="cursor:pointer; font-size:20px;">🖼️</label>
            <input type="file" id="img-input" accept="image/*" style="display:none;" onchange="sendImage(this)">
            <input type="text" id="msg-input" placeholder="Message..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <div id="admin-screen" class="container" style="display:none;">
        <div class="glass-card">
            <h3>Admin Panel (Sensitive Data)</h3>
            <div id="user-registry" style="text-align:left; max-height:300px; overflow-y:auto; margin-bottom: 15px; border: 1px solid #eee; padding: 10px; border-radius: 10px;"></div>
            <button class="main-btn" style="background:#666;" onclick="closeAdmin()">Back to Chat</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
