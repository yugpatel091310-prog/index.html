<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triple Vault System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="page-login" class="page active">
        <div class="auth-center">
            <h1 class="neon-txt">MASTER_LOGIN</h1>
            <input type="text" id="login-u" placeholder="ADMIN_ID">
            <input type="password" id="login-p" placeholder="ACCESS_KEY">
            <button class="btn-glow" onclick="handleAuth()">INITIALIZE</button>
        </div>
    </div>

    <div id="page-files" class="page">
        <div class="nav-bar">
            <span class="logo">15GB_HYPER_VAULT</span>
            <div style="display:flex; gap:10px;">
                <button class="nav-btn" onclick="showPage('page-settings')">⚙️</button>
                <button class="nav-btn" style="background:red" onclick="location.reload()">EXIT</button>
            </div>
        </div>
        
        <div class="content-scroll">
            <div class="admin-card">
                <input type="file" id="up" onchange="smartUpload(this)" style="display:none">
                <label for="up" class="btn-glow" style="display:block; text-align:center;">+ UPLOAD FILE</label>
                <p id="status-text" style="font-size:11px; text-align:center; margin-top:8px; color:gray;">READY</p>
            </div>

            <div class="vault-container">
                <h3 class="folder-title">📁 FOLDER_01 (Project A)</h3>
                <div id="list-1" class="file-list"></div>

                <h3 class="folder-title">📁 FOLDER_02 (Project B)</h3>
                <div id="list-2" class="file-list"></div>

                <h3 class="folder-title">📁 FOLDER_03 (Project C)</h3>
                <div id="list-3" class="file-list"></div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
