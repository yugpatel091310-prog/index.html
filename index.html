<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>15GB Hyper Vault</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="page-login" class="page active">
        <div class="auth-center">
            <h1 class="neon-txt">MASTER_LOGIN</h1>
            <input type="text" id="login-u" placeholder="ADMIN_ID">
            <input type="password" id="login-p" placeholder="ACCESS_KEY">
            <button class="btn-glow" onclick="handleAuth()">INITIALIZE</button>
        </div>
    </div>

    <div id="page-files" class="page">
        <div class="nav-bar">
            <span class="logo">15GB_HYPER_VAULT</span>
            <div style="display:flex; gap:8px;">
                <button class="nav-btn" onclick="loadAllVaults()">🔄</button>
                <button class="nav-btn" onclick="showPage('page-settings')">⚙️</button>
                <button class="nav-btn" style="background:red;" onclick="location.reload()">EXIT</button>
            </div>
        </div>
        
        <div class="content-scroll">
            <div class="admin-card">
                <input type="file" id="up" onchange="smartUpload(this)" style="display:none">
                <label for="up" class="btn-glow" style="display:block; text-align:center;">+ UPLOAD FILE</label>
                <p id="status-text" style="font-size:10px; text-align:center; margin-top:8px; color:gray;">READY</p>
            </div>

            <h3 class="logo">📁 VAULT_01</h3>
            <div id="list-1"></div>

            <h3 class="logo" style="margin-top:20px;">📁 VAULT_02</h3>
            <div id="list-2"></div>

            <h3 class="logo" style="margin-top:20px;">📁 VAULT_03</h3>
            <div id="list-3"></div>
        </div>
    </div>

    <div id="page-settings" class="page">
        <div class="nav-bar">
            <button class="nav-btn" onclick="showPage('page-files')">← BACK</button>
            <span class="logo">SETTINGS</span>
        </div>
        <div class="content-scroll">
            <div class="admin-card">
                <h3>CHANGE MASTER KEY</h3>
                <input type="password" id="new-admin-p" placeholder="NEW_PASSWORD">
                <button class="btn-glow" onclick="changeAdminPass()">SAVE_NEW_KEY</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
