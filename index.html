<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neural Vault Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="page-login" class="page active">
        <div class="auth-center">
            <h1 class="neon-txt">VAULT_OS</h1>
            <input type="text" id="login-u" placeholder="IDENTITY_ID">
            <input type="password" id="login-p" placeholder="ACCESS_KEY">
            <button class="btn-glow" onclick="handleAuth()">INITIALIZE</button>
        </div>
    </div>

    <div id="page-chat" class="page">
        <div class="nav-bar">
            <span class="logo">COMMS</span>
            <button class="nav-btn" onclick="showPage('page-files')">FILES</button>
            <button class="nav-btn" onclick="checkAdmin()">SYSTEM</button>
        </div>
        <div id="chat-box"></div>
        <div class="input-row">
            <button class="action-btn" ontouchstart="startRec()" ontouchend="stopRec()">🎤</button>
            <input type="text" id="msg-input" placeholder="Transmission...">
            <button class="action-btn cyan" onclick="sendMsg()">➤</button>
        </div>
    </div>

    <div id="page-files" class="page">
        <div class="nav-bar">
            <button class="nav-btn" onclick="showPage('page-chat')">← BACK</button>
            <span class="logo">VAULT</span>
            <div id="import-slot"></div>
        </div>
        <div class="content-scroll" id="file-list"></div>
    </div>

    <div id="page-admin" class="page">
        <div class="nav-bar">
            <button class="nav-btn" onclick="showPage('page-chat')">← BACK</button>
            <span class="logo">SYSTEM</span>
        </div>
        <div class="content-scroll">
            <div class="admin-card">
                <h3>SECURITY</h3>
                <button class="btn-outline" onclick="changeVaultKey()">CHANGE VAULT KEY</button>
                <button class="btn-outline" style="color:red" onclick="location.reload()">LOGOUT</button>
            </div>
            <div id="admin-only" style="display:none;">
                <div class="admin-card">
                    <h3>USERS</h3>
                    <div id="user-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
