<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Private Neural Vault</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="page-login" class="page active">
        <div class="auth-center">
            <h1 class="neon-txt">VAULT_ACCESS</h1>
            <input type="text" id="login-u" placeholder="ADMIN_ID">
            <input type="password" id="login-p" placeholder="ACCESS_KEY">
            <button class="btn-glow" onclick="handleAuth()">INITIALIZE</button>
        </div>
    </div>

    <div id="page-files" class="page">
        <div class="nav-bar">
            <span class="logo">SECURE_FILES</span>
            <div class="header-btns">
                <button class="nav-btn" onclick="showPage('page-settings')">SETTINGS</button>
                <button class="nav-btn red" onclick="location.reload()">EXIT</button>
            </div>
        </div>
        
        <div class="content-scroll">
            <div class="admin-card" id="upload-zone">
                <input type="file" id="up" onchange="upFile(this)" style="display:none">
                <label for="up" class="btn-glow" style="display:block; text-align:center;">+ UPLOAD NEW FILE</label>
            </div>
            <div id="file-list"></div>
        </div>
    </div>

    <div id="page-settings" class="page">
        <div class="nav-bar">
            <button class="nav-btn" onclick="showPage('page-files')">← BACK</button>
            <span class="logo">ADMIN_SETTINGS</span>
        </div>
        <div class="content-scroll">
            <div class="admin-card">
                <h3>CHANGE LOGIN PASSWORD</h3>
                <input type="password" id="new-admin-p" placeholder="NEW_PASSWORD">
                <button class="btn-glow" onclick="changeAdminPass()">UPDATE PASSWORD</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
