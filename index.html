        <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Portal | Swipe, Chat & Admin</title>
    <style>
        :root { 
            --admin-color: #1e293b; 
            --editor-color: #0284c7; 
            --reader-color: #64748b;
            --primary: #2563eb; 
            --bg: #f1f5f9; 
            --chat-sent: #2563eb;
            --chat-received: #ffffff;
        }
        
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; color: #1e293b; margin: 0; }
        .card { width: 100%; max-width: 800px; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        
        /* UI Elements */
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 14px; outline: none; }
        input:focus { border-color: var(--primary); ring: 2px var(--primary); }
        
        /* Swipe to Login */
        .swipe-container { position: relative; width: 100%; height: 60px; background: #e2e8f0; border-radius: 30px; margin-top: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; user-select: none; border: 2px solid #cbd5e1; }
        .swipe-text { font-size: 14px; font-weight: 600; color: #64748b; pointer-events: none; z-index: 1; }
        .swipe-handle { position: absolute; left: 6px; width: 48px; height: 48px; background: var(--primary); border-radius: 50%; cursor: grab; display: flex; align-items: center; justify-content: center; color: white; z-index: 2; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.1s linear; }
        .swipe-handle:active { cursor: grabbing; }

        /* Tabs & Buttons */
        .tab-nav { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #e2e8f0; padding-bottom: 15px; }
        button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-main { background: var(--primary); color: white; }
        .btn-admin { background: var(--admin-color); color: white; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-small { padding: 5px 10px; font-size: 12px; }

        /* Chat UI */
        #chat-window { height: 350px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0; }
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 15px; font-size: 13px; line-height: 1.4; position: relative; }
        .msg-sent { align-self: flex-end; background: var(--chat-sent); color: white; border-bottom-right-radius: 2px; }
        .msg-received { align-self: flex-start; background: var(--chat-received); color: #1e293b; border: 1px solid #e2e8f0; border-bottom-left-radius: 2px; }
        .msg-meta { font-size: 10px; opacity: 0.7; margin-bottom: 4px; display: block; font-weight: bold; }

        /* Hold to View Eye */
        .input-wrapper { position: relative; width: 100%; }
        .view-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 18px; z-index: 5; user-select: none; }

        /* Admin Styles */
        .user-card { background: #f1f5f9; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #e2e8f0; }
        .role-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; color: white; text-transform: uppercase; margin-left: 5px; }
    </style>
</head>
<body>

<div class="card">
    <div id="login-section">
        <h2 style="text-align:center; margin-top:0;">Secure Access</h2>
        <p style="text-align:center; color:#64748b; font-size:14px;">Enter credentials and swipe to enter</p>
        
        <input type="text" id="login-username" placeholder="Username">
        <div class="input-wrapper">
            <input type="password" id="login-password" placeholder="Password">
            <button class="view-btn" 
                onmousedown="togglePW('login-password', true)" 
                onmouseup="togglePW('login-password', false)"
                onmouseleave="togglePW('login-password', false)"
                ontouchstart="togglePW('login-password', true)" 
                ontouchend="togglePW('login-password', false)">👁️</button>
        </div>

        <div class="swipe-container" id="swipe-track">
            <span class="swipe-text">Swipe to Login →</span>
            <div class="swipe-handle" id="swipe-handle">🚀</div>
        </div>
    </div>

    <div id="content-section" class="hidden">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div>
                <h3 id="welcome-msg" style="margin:0">Welcome</h3>
                <span id="role-display" class="role-badge"></span>
            </div>
            <button class="btn-danger btn-small" onclick="location.reload()">Logout</button>
        </div>

        <div class="tab-nav">
            <button class="btn-main" onclick="switchTab('dashboard-tab')">Dashboard</button>
            <button class="btn-main" style="background:#64748b" onclick="switchTab('chat-tab')">Chat</button>
            <button id="admin-nav-btn" class="btn-admin hidden" onclick="switchTab('admin-tab')">Users</button>
        </div>

        <div id="dashboard-tab" class="tab-content">
            <div id="portal-content" style="background:#fffbeb; padding:20px; border-radius:12px; border-left:5px solid #f59e0b;">
                <p id="display-text" style="margin:0;"></p>
            </div>
            <div id="editor-tools" class="hidden" style="margin-top:20px; padding-top:15px; border-top:1px solid #e2e8f0;">
                <h4>Edit Content</h4>
                <textarea id="edit-area" rows="3"></textarea>
                <button class="btn-main" onclick="updatePortalContent()">Save Content</button>
            </div>
        </div>

        <div id="chat-tab" class="tab-content hidden">
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                <label style="font-size:12px; font-weight:bold;">Recipient:</label>
                <select id="chat-target" style="margin:0; padding:5px; flex:1;">
                    <option value="All">Everyone (Public)</option>
                </select>
            </div>
            <div id="chat-window"></div>
            <div style="display:flex; gap:8px; margin-top:10px;">
                <input type="text" id="chat-input" placeholder="Type a message..." style="margin:0;">
                <button class="btn-main" onclick="sendChatMessage()">Send</button>
            </div>
        </div>

        <div id="admin-tab" class="tab-content hidden">
            <h4>Add New User</h4>
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px;">
                <input type="text" id="new-u" placeholder="User">
                <input type="text" id="new-p" placeholder="Pass">
                <select id="new-r" style="margin:8px 0;">
                    <option value="reader">Reader</option>
                    <option value="editor">Editor</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <button class="btn-admin" style="width:100%; margin-bottom:20px;" onclick="createNewUser()">Create User</button>
            
            <h4>Manage Users</h4>
            <div id="user-list-container"></div>
        </div>
    </div>
</div>

<script>
    // --- DATABASE MOCKUP ---
    const DEFAULT_ADMIN = { username: "Yug Patel", password: "yugpatel1309", role: "admin" };
    let users = JSON.parse(localStorage.getItem('sys_users')) || [DEFAULT_ADMIN];
    let chats = JSON.parse(localStorage.getItem('sys_chats')) || [];
    let portalData = JSON.parse(localStorage.getItem('sys_portal')) || { text: "Welcome to the secure administrative interface. No messages yet." };
    let currentUser = null;

    // --- SECURITY LOGIC ---
    function togglePW(id, show) { document.getElementById(id).type = show ? "text" : "password"; }

    const handle = document.getElementById('swipe-handle');
    const track = document.getElementById('swipe-track');
    let isSwiping = false, startX = 0;

    handle.addEventListener('mousedown', startSwipe);
    handle.addEventListener('touchstart', startSwipe);
    window.addEventListener('mousemove', moveSwipe);
    window.addEventListener('touchmove', moveSwipe);
    window.addEventListener('mouseup', endSwipe);
    window.addEventListener('touchend', endSwipe);

    function startSwipe(e) { isSwiping = true; startX = (e.type === 'touchstart') ? e.touches[0].clientX : e.clientX; handle.style.transition = 'none'; }
    function moveSwipe(e) {
        if (!isSwiping) return;
        let x = (e.type === 'touchmove') ? e.touches[0].clientX : e.clientX;
        let delta = x - startX;
        let limit = track.offsetWidth - handle.offsetWidth - 12;
        if (delta < 0) delta = 0; if (delta > limit) delta = limit;
        handle.style.transform = `translateX(${delta}px)`;
        if (delta >= limit * 0.96) { isSwiping = false; attemptLogin(); }
    }
    function endSwipe() { isSwiping = false; handle.style.transition = '0.3s ease'; handle.style.transform = 'translateX(0px)'; }

    function attemptLogin() {
        const u = document.getElementById('login-username').value;
        const p = document.getElementById('login-password').value;
        const user = users.find(x => x.username === u && x.password === p);
        if (user) { currentUser = user; initPortal(); } else { alert("Access Denied"); }
    }

    // --- PORTAL LOGIC ---
    function initPortal() {
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('content-section').classList.remove('hidden');
        document.getElementById('welcome-msg').innerText = `Hello, ${currentUser.username}`;
        
        const rBadge = document.getElementById('role-display');
        rBadge.innerText = currentUser.role;
        rBadge.style.background = currentUser.role === 'admin' ? 'var(--admin-color)' : (currentUser.role === 'editor' ? 'var(--editor-color)' : 'var(--reader-color)');

        document.getElementById('display-text').innerText = portalData.text;

        if (currentUser.role === 'admin' || currentUser.role === 'editor') {
            document.getElementById('editor-tools').classList.remove('hidden');
            document.getElementById('edit-area').value = portalData.text;
        }
        if (currentUser.role === 'admin') {
            document.getElementById('admin-nav-btn').classList.remove('hidden');
            refreshAdminList();
        }
        
        refreshChatRecipients();
        renderChatMessages();
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.getElementById(tabId).classList.remove('hidden');
    }

    function updatePortalContent() {
        portalData.text = document.getElementById('edit-area').value;
        document.getElementById('display-text').innerText = portalData.text;
        localStorage.setItem('sys_portal', JSON.stringify(portalData));
        alert("Portal Updated");
    }

    // --- CHAT LOGIC ---
    function refreshChatRecipients() {
        const select = document.getElementById('chat-target');
        select.innerHTML = '<option value="All">Everyone (Public)</option>';
        users.forEach(u => {
            if (u.username !== currentUser.username) {
                const opt = document.createElement('option');
                opt.value = u.username;
                opt.innerText = `Private: ${u.username}`;
                select.appendChild(opt);
            }
        });
    }

    function sendChatMessage() {
        const input = document.getElementById('chat-input');
        const target = document.getElementById('chat-target').value;
        if (!input.value.trim()) return;

        chats.push({
            from: currentUser.username,
            to: target,
            msg: input.value,
            ts: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
        });

        localStorage.setItem('sys_chats', JSON.stringify(chats));
        input.value = "";
        renderChatMessages();
    }

    function renderChatMessages() {
        const win = document.getElementById('chat-window');
        win.innerHTML = "";
        chats.forEach(c => {
            const isVisible = c.to === "All" || c.to === currentUser.username || c.from === currentUser.username;
            if (isVisible) {
                const div = document.createElement('div');
                div.className = `msg ${c.from === currentUser.username ? 'msg-sent' : 'msg-received'}`;
                const label = c.to === "All" ? `[Public] ${c.from}` : `${c.from} ➔ ${c.to}`;
                div.innerHTML = `<span class="msg-meta">${label} • ${c.ts}</span>${c.msg}`;
                win.appendChild(div);
            }
        });
        win.scrollTop = win.scrollHeight;
    }

    // --- ADMIN LOGIC ---
    function createNewUser() {
        const u = document.getElementById('new-u').value;
        const p = document.getElementById('new-p').value;
        const r = document.getElementById('new-r').value;
        if (u && p) {
            users.push({ username: u, password: p, role: r });
            localStorage.setItem('sys_users', JSON.stringify(users));
            refreshAdminList();
            refreshChatRecipients();
            document.getElementById('new-u').value = "";
            document.getElementById('new-p').value = "";
        }
    }

    function removeUser(idx) {
        if (users[idx].username === currentUser.username) return alert("Cannot delete self");
        users.splice(idx, 1);
        localStorage.setItem('sys_users', JSON.stringify(users));
        refreshAdminList();
    }

    function refreshAdminList() {
        const container = document.getElementById('user-list-container');
        container.innerHTML = users.map((u, i) => `
            <div class="user-card">
                <span><strong>${u.username}</strong> <span class="role-badge" style="background:#64748b">${u.role}</span></span>
                <button class="btn-danger btn-small" onclick="removeUser(${i})">Delete</button>
            </div>
        `).join('');
    }
</script>

</body>
</html>
