<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cloud Vault Mobile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen" class="app-container">
        <div class="auth-box">
            <h1>VAULT_LOGIN</h1>
            <input type="text" id="login-username" placeholder="Username" autocomplete="off">
            <input type="password" id="login-password" placeholder="Password">
            <button class="btn-primary" onclick="handleAuth()">LOGIN</button>
        </div>
    </div>

    <div id="chat-screen" class="app-container" style="display:none;">
        <div class="main-header">
            <span id="user-tag">USER</span>
            <div class="header-btns">
                <button class="btn-small" onclick="promptVault()">SETTINGS</button>
                <button class="btn-small btn-red" onclick="logout()">EXIT</button>
            </div>
        </div>

        <div id="messages-display"></div>

        <div class="bottom-bar">
            <button id="voice-btn" class="btn-action" onmousedown="startRec()" onmouseup="stopRec()" ontouchstart="startRec()" ontouchend="stopRec()">🎤</button>
            <input type="text" id="msg-input" placeholder="Message...">
            <button class="btn-action btn-send" onclick="send()">➤</button>
        </div>
    </div>

    <div id="admin-screen" class="full-modal" style="display:none;">
        <div class="modal-header">
            <h2>SETTINGS</h2>
            <button onclick="closeAdmin()">CLOSE</button>
        </div>
        <div class="modal-body">
            <div id="admin-import-zone"></div>
            <h3>FILES</h3>
            <div id="vault-display"></div>
            
            <div id="admin-only-section" style="display:none;">
                <hr>
                <h3>ADMIN TOOLS</h3>
                <button class="btn-primary" onclick="addUser()">+ ADD USER</button>
                <div id="user-registry"></div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
