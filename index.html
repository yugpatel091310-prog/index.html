<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yug's Private Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen" class="container">
        <h2>Welcome</h2>
        <input type="text" id="login-username" placeholder="Username">
        <div class="password-container">
            <input type="password" id="login-password" placeholder="Password">
            <button type="button" id="toggle-eye" onclick="toggleView()">👁️</button>
        </div>
        <button class="main-btn" onclick="handleLogin()">Login</button>
    </div>

    <div id="chat-screen" class="container" style="display:none;">
        <div class="header">
            <h3>Chatting as: <span id="user-tag"></span></h3>
            <button id="admin-gate" style="display:none;" onclick="openAdmin()">⚙️ Admin</button>
            <button class="logout-btn" onclick="location.reload()">Exit</button>
        </div>
        <div id="messages-display"></div>
        <div class="input-row">
            <input type="text" id="msg-input" placeholder="Write a message...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <div id="admin-screen" class="container" style="display:none;">
        <h3>Admin Control</h3>
        <div class="admin-form">
            <input type="text" id="new-u" placeholder="New Username">
            <input type="text" id="new-p" placeholder="New Password">
            <button onclick="createUser()">Add User</button>
        </div>
        <hr>
        <h4>All Users & Passwords</h4>
        <div id="user-registry"></div>
        <button class="close-btn" onclick="closeAdmin()">Back to Chat</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
