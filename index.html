<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neural Vault OS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="page-login" class="page active">
        <div class="auth-center">
            <h1 class="neon-txt">VAULT_OS</h1>
            <div class="input-group">
                <input type="text" id="login-u" placeholder="IDENTITY_ID">
                <input type="password" id="login-p" placeholder="ACCESS_KEY">
                <button class="btn-glow" onclick="handleAuth()">INITIALIZE</button>
            </div>
        </div>
    </div>

    <div id="page-chat" class="page">
        <div class="nav-bar">
            <span class="logo">COMMS</span>
            <button class="nav-btn" onclick="showPage('page-files')">FILES</button>
            <button class="nav-btn" onclick="checkAdminAccess()">SYSTEM</button>
        </div>
        <div id="chat-box"></div>
        <div class="input-row">
            <button class="action-btn" ontouchstart="startRec()" ontouchend="stopRec()">🎤</button>
            <input type="text" id="msg-input" placeholder="Transmission...">
            <button class="action-btn cyan" onclick="sendMsg()">➤</button>
        </div>
    </div>

    <div id="page-files" class="page">
        <div class="nav-bar">
            <button class="nav-btn" onclick="showPage('page-chat')">← BACK</button>
            <span class="logo">VAULT</span>
            <div id="import-slot"></div>
        </div>
        <div class="content-scroll" id="file-list"></div>
    </div>

    <div id="page-admin" class="page">
        <div class="nav-bar">
            <button class="nav-btn" onclick="showPage('page-chat')">← BACK</button>
            <span class="logo">SYSTEM</span>
        </div>
        <div class="content-scroll">
            <section class="admin-card">
                <h3>SECURITY_CONFIG</h3>
                <button class="btn-outline" onclick="updateVaultKey()">CHANGE_VAULT_KEY</button>
                <button class="btn-outline" onclick="logout()">TERMINATE_SESSION</button>
            </section>
            
            <section class="admin-card">
                <h3>USER_MANAGEMENT</h3>
                <button class="btn-glow" onclick="addUser()">+ ADD_NEW_USER</button>
                <div id="user-list"></div>
            </section>
        </div>
    </div>

    <div id="modal-vault" class="modal">
        <div class="modal-card">
            <h3>ENTER_VAULT_KEY</h3>
            <input type="password" id="vault-key-input">
            <button class="btn-glow" onclick="verifyVaultAccess()">DECRYPT</button>
            <button class="btn-link" onclick="closeModal()">CANCEL</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
