<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neural Vault OS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">

    <section id="page-login" class="page active">
        <div class="auth-center">
            <h1 class="glow-text">NEURAL_SYS</h1>
            <div class="input-group">
                <input type="text" id="login-u" placeholder="IDENTITY_ID">
                <input type="password" id="login-p" placeholder="ACCESS_KEY">
                <button class="btn-hero" onclick="handleAuth()">INITIALIZE</button>
            </div>
        </div>
    </section>

    <section id="page-chat" class="page">
        <header class="app-bar">
            <span class="brand">COMMS</span>
            <div class="nav-icons">
                <button onclick="nav('page-vault-auth')">📁</button>
                <button onclick="logout()">✕</button>
            </div>
        </header>
        <div id="chat-flow" class="content"></div>
        <footer class="input-bar">
            <button class="btn-circle" ontouchstart="startRec()" ontouchend="stopRec()">🎤</button>
            <input type="text" id="msg-input" placeholder="Transmission...">
            <button class="btn-circle neon" onclick="sendMsg()">➤</button>
        </footer>
    </section>

    <section id="page-vault-auth" class="page">
        <div class="full-center">
            <h3>DECRYPTION_REQUIRED</h3>
            <input type="password" id="v-key-input" placeholder="ENTER_VAULT_KEY">
            <button class="btn-hero" onclick="checkVaultKey()">UNLOCK</button>
            <button class="btn-link" onclick="nav('page-chat')">BACK_TO_COMMS</button>
        </div>
    </section>

    <section id="page-files" class="page">
        <header class="app-bar">
            <button onclick="nav('page-chat')">←</button>
            <span class="brand">VAULT_FILES</span>
            <button id="admin-btn-nav" style="display:none;" onclick="nav('page-admin')">⚙️</button>
        </header>
        <div id="file-list" class="content scrollable"></div>
    </section>

    <section id="page-admin" class="page">
        <header class="app-bar">
            <button onclick="nav('page-files')">←</button>
            <span class="brand">ROOT_TOOLS</span>
        </header>
        <div class="content scrollable padded">
            <div class="card">
                <h4>IMPORT_DATA</h4>
                <input type="file" onchange="handleUpload(this)">
            </div>
            <div class="card">
                <h4>USER_REGISTRY</h4>
                <button class="btn-small" onclick="createNewUser()">+ NEW_USER</button>
                <div id="user-list"></div>
            </div>
            <div class="card">
                <h4>SECURITY</h4>
                <button class="btn-small" onclick="updateVaultKey()">CHANGE_VAULT_KEY</button>
            </div>
        </div>
    </section>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
