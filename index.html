<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Cloud Portal | Fixed</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --admin: #1e293b; --editor: #0284c7; --reader: #64748b; --primary: #2563eb; --bg: #f1f5f9; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            color: #1e293b; 
            margin: 0;
        }

        .card { 
            width: 100%; 
            max-width: 800px; 
            background: white; 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            box-sizing: border-box; 
            /* Prevent accidental text highlighting during interaction */
            user-select: none; 
            -webkit-user-select: none;
        }

        .hidden { display: none !important; }
        
        /* Input Styling */
        .input-group { position: relative; width: 100%; margin: 10px 0; }
        
        input, select { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid #cbd5e1; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px; 
            outline: none; 
            /* Allow text selection inside inputs only */
            user-select: text;
            -webkit-user-select: text;
        }

        .eye-btn { 
            position: absolute; 
            right: 12px; 
            top: 50%; 
            transform: translateY(-50%); 
            background: none; 
            border: none; 
            font-size: 20px; 
            cursor: pointer; 
        }

        /* Buttons */
        button { 
            padding: 12px 20px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
            transition: transform 0.1s, opacity 0.2s;
        }
        button:active { transform: scale(0.98); }

        .btn-login { 
            background: var(--primary); 
            color: white; 
            width: 100%; 
            margin-top: 15px; 
            font-size: 16px;
        }

        .btn-blue { background: var(--primary); color: white; }
        .btn-dark { background: var(--admin); color: white; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #ddd; padding-bottom: 15px; }

        /* Chat UI */
        #chat-window { 
            height: 350px; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            background: #f8fafc; 
            border-radius: 12px; 
            border: 1px solid #e2e8f0; 
        }
        .msg { max-width: 80%; padding: 10px; border-radius: 12px; font-size: 14px; }
        .sent { align-self: flex-end; background: var(--primary); color: white; }
        .recv { align-self: flex-start; background: white; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="card">
    <div id="login-screen">
        <h2 style="text-align:center; margin-top:0;">Secure Login</h2>
        <p style="text-align:center; color:#64748b; font-size:14px;">Access your cloud-synced portal</p>
        
        <div class="input-group">
            <input type="text" id="login-u" placeholder="Username" autocomplete="off">
        </div>
        
        <div class="input-group">
            <input type="password" id="login-p" placeholder="Password" autocomplete="off">
            <button class="eye-btn" 
                onmousedown="peek(true)" onmouseup="peek(false)" 
                onmouseleave="peek(false)"
                ontouchstart="peek(true)" ontouchend="peek(false)">👁️</button>
        </div>

        <button class="btn-login" onclick="login()">Login to System</button>
    </div>

    <div id="main-portal" class="hidden">
        <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:15px;">
            <h3 id="welcome-msg" style="margin:0">Welcome</h3>
            <button onclick="location.reload()" style="background:#dc2626; color:white; padding:5px 12px; font-size:12px;">Logout</button>
        </div>

        <div class="nav-tabs">
            <button class="btn-blue" onclick="showTab('chat')">Messenger</button>
            <button id="admin-btn" class="btn-dark hidden" onclick="showTab('admin')">Admin Panel</button>
        </div>

        <div id="chat-tab" class="tab">
            <select id="chat-target" style="margin-bottom:10px;"><option value="All">Everyone (Public)</option></select>
            <div id="chat-window"></div>
            <div style="display:flex; gap:8px; margin-top:10px;">
                <input type="text" id="chat-msg" placeholder="Message..." style="margin:0;">
                <button class="btn-blue" onclick="sendMessage()">Send</button>
            </div>
        </div>

        <div id="admin-tab" class="tab hidden">
            <h4>User Management</h4>
            <div id="user-list-db" style="margin-bottom:15px; max-height: 200px; overflow-y: auto;"></div>
            <hr>
            <h5>Add New Account</h5>
            <input type="text" id="new-user-name" placeholder="Name">
            <input type="text" id="new-user-pass" placeholder="Password">
            <select id="new-user-role">
                <option value="reader">Reader</option>
                <option value="editor">Editor</option>
                <option value="admin">Admin</option>
            </select>
            <button class="btn-dark" style="width:100%" onclick="createUser()">Create User</button>
        </div>
    </div>
</div>

<script>
    // 1. FIREBASE CONFIGURATION (Must be filled to work)
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
        projectId: "YOUR_PROJECT",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentUser = null;

    // 2. PASSWORD PEEK LOGIC
    function peek(show) { 
        document.getElementById('login-p').type = show ? 'text' : 'password'; 
    }

    // 3. LOGIN LOGIC
    function login() {
        const btn = document.querySelector('.btn-login');
        const u = document.getElementById('login-u').value.trim();
        const p = document.getElementById('login-p').value.trim();

        if(!u || !p) return alert("Please fill all fields");
        
        btn.innerText = "Authenticating...";
        btn.disabled = true;

        db.ref('users').once('value', (snap) => {
            const data = snap.val();
            let found = null;
            
            for(let id in data) {
                if(data[id].username === u && data[id].password === p) {
                    found = data[id];
                    break;
                }
            }

            if(found) { 
                currentUser = found; 
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-portal').classList.remove('hidden');
                document.getElementById('welcome-msg').innerText = `Hi, ${currentUser.username}`;
                
                if(currentUser.role === 'admin') {
                    document.getElementById('admin-btn').classList.remove('hidden');
                    loadAdminData();
                }
                syncChat();
                syncUserOptions();
            } else {
                alert("Login Failed. User not found in Firebase.");
                btn.innerText = "Login to System";
                btn.disabled = false;
            }
        });
    }

    function showTab(id) {
        document.querySelectorAll('.tab').forEach(t => t.classList.add('hidden'));
        document.getElementById(id + '-tab').classList.remove('hidden');
    }

    // 4. CLOUD CHAT SYSTEM
    function sendMessage() {
        const input = document.getElementById('chat-msg');
        const txt = input.value.trim();
        const to = document.getElementById('chat-target').value;
        if(!txt) return;

        db.ref('chats').push({ 
            from: currentUser.username, 
            to: to, 
            msg: txt, 
            ts: Date.now() 
        });
        input.value = "";
    }

    function syncChat() {
        db.ref('chats').on('value', (snap) => {
            const win = document.getElementById('chat-window');
            win.innerHTML = "";
            snap.forEach(msg => {
                const m = msg.val();
                // Filter: Show if Public, OR if user is sender, OR if user is recipient
                if(m.to === 'All' || m.to === currentUser.username || m.from === currentUser.username) {
                    const div = document.createElement('div');
                    div.className = `msg ${m.from === currentUser.username ? 'sent' : 'recv'}`;
                    const label = m.to === 'All' ? `[Public] ${m.from}` : `${m.from} ➔ ${m.to}`;
                    div.innerHTML = `<small style="font-size:10px; display:block; opacity:0.7; font-weight:bold;">${label}</small>${m.msg}`;
                    win.appendChild(div);
                }
            });
            win.scrollTop = win.scrollHeight;
        });
    }

    // 5. USER SYNC & ADMIN
    function syncUserOptions() {
        db.ref('users').on('value', (snap) => {
            const sel = document.getElementById('chat-target');
            const currentVal = sel.value;
            sel.innerHTML = '<option value="All">Everyone (Public)</option>';
            snap.forEach(u => {
                const userData = u.val();
                if(userData.username !== currentUser.username) {
                    const opt = document.createElement('option');
                    opt.value = userData.username;
                    opt.innerText = `Private: ${userData.username}`;
                    sel.appendChild(opt);
                }
            });
            sel.value = currentVal;
        });
    }

    function loadAdminData() {
        db.ref('users').on('value', (snap) => {
            const list = document.getElementById('user-list-db');
            list.innerHTML = "";
            snap.forEach(u => {
                const userData = u.val();
                list.innerHTML += `<div style="padding:10px; background:#f1f5f9; margin-bottom:5px; border-radius:8px; border:1px solid #e2e8f0;">
                    <b>${userData.username}</b> <small style="color:var(--primary)">(${userData.role})</small>
                </div>`;
            });
        });
    }

    function createUser() {
        const u = document.getElementById('new-user-name').value.trim();
        const p = document.getElementById('new-user-pass').value.trim();
        const r = document.getElementById('new-user-role').value;
        if(u && p) {
            db.ref('users').push({ username: u, password: p, role: r });
            document.getElementById('new-user-name').value = "";
            document.getElementById('new-user-pass').value = "";
            alert("Account Created!");
        }
    }
</script>
</body>
</html>
