<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Portal | Firebase Realtime</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --admin: #1e293b; --editor: #0284c7; --reader: #64748b; --primary: #2563eb; --bg: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; color: #1e293b; margin: 0; }
        .card { width: 100%; max-width: 800px; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        
        /* Swipe Login */
        .swipe-track { position: relative; width: 100%; height: 60px; background: #e2e8f0; border-radius: 30px; margin-top: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px solid #cbd5e1; }
        .swipe-handle { position: absolute; left: 6px; width: 48px; height: 48px; background: var(--primary); border-radius: 50%; cursor: grab; display: flex; align-items: center; justify-content: center; color: white; z-index: 2; transition: transform 0.1s linear; }

        /* Tabs */
        .nav { display: flex; gap: 10px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #e2e8f0; }
        button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-dark { background: var(--admin); color: white; }
        
        /* Chat */
        #chat-win { height: 350px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; }
        .msg { max-width: 75%; padding: 10px; border-radius: 12px; font-size: 13px; }
        .sent { align-self: flex-end; background: var(--primary); color: white; }
        .recv { align-self: flex-start; background: white; border: 1px solid #ddd; }

        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        .eye { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; background: none; border: none; font-size: 18px; }
    </style>
</head>
<body>

<div class="card">
    <div id="login-box">
        <h2 style="text-align:center">Cloud Secure Portal</h2>
        <input type="text" id="user" placeholder="Username">
        <div style="position:relative">
            <input type="password" id="pass" placeholder="Password">
            <button class="eye" onmousedown="peek(true)" onmouseup="peek(false)" ontouchstart="peek(true)" ontouchend="peek(false)">👁️</button>
        </div>
        <div class="swipe-track" id="track">
            <span style="color:#64748b; font-size:14px;">Swipe to Login →</span>
            <div class="swipe-handle" id="handle">🚀</div>
        </div>
    </div>

    <div id="app-box" class="hidden">
        <div style="display:flex; justify-content: space-between; align-items:center;">
            <h3 id="hi">Welcome</h3>
            <button onclick="location.reload()" style="background:#dc2626; color:white">Logout</button>
        </div>

        <div class="nav">
            <button class="btn-blue" onclick="tab('chat')">Chat</button>
            <button id="adm-btn" class="btn-dark hidden" onclick="tab('adm')">Admin</button>
        </div>

        <div id="chat-tab" class="tab">
            <select id="target"><option value="All">Everyone (Public)</option></select>
            <div id="chat-win"></div>
            <div style="display:flex; gap:5px; margin-top:10px;">
                <input type="text" id="m-in" placeholder="Message..." style="margin:0">
                <button class="btn-blue" onclick="send()">Send</button>
            </div>
        </div>

        <div id="adm-tab" class="tab hidden">
            <h4>User Management</h4>
            <div id="u-list"></div>
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px;">
                <input type="text" id="nu" placeholder="New User">
                <input type="text" id="np" placeholder="Pass">
                <select id="nr"><option value="reader">Reader</option><option value="admin">Admin</option></select>
            </div>
            <button class="btn-dark" style="width:100%" onclick="addUser()">Create User</button>
        </div>
    </div>
</div>

<script>
    // --- !!! REPLACE WITH YOUR FIREBASE CONFIG !!! ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
        projectId: "YOUR_PROJECT",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentUser = null;

    // Peek Logic
    function peek(s) { document.getElementById('pass').type = s ? 'text' : 'password'; }

    // Swipe Logic
    const h = document.getElementById('handle'), t = document.getElementById('track');
    let swiping = false, start = 0;
    h.addEventListener('mousedown', (e) => { swiping = true; start = e.clientX; h.style.transition = 'none'; });
    h.addEventListener('touchstart', (e) => { swiping = true; start = e.touches[0].clientX; h.style.transition = 'none'; });
    window.addEventListener('mousemove', (e) => {
        if(!swiping) return;
        let d = e.clientX - start;
        let max = t.offsetWidth - h.offsetWidth - 12;
        if(d < 0) d = 0; if(d > max) d = max;
        h.style.transform = `translateX(${d}px)`;
        if(d >= max * 0.98) { swiping = false; login(); }
    });
    window.addEventListener('mouseup', () => { swiping = false; h.style.transition = '0.3s'; h.style.transform = 'translateX(0px)'; });

    // Login (Checks Cloud for Users)
    function login() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        
        db.ref('users').once('value', (snap) => {
            const data = snap.val();
            let found = null;
            for(let id in data) {
                if(data[id].username === u && data[id].password === p) found = data[id];
            }
            if(found) { currentUser = found; startApp(); } else { alert("Invalid!"); h.style.transform = 'translateX(0px)'; }
        });
    }

    function startApp() {
        document.getElementById('login-box').classList.add('hidden');
        document.getElementById('app-box').classList.remove('hidden');
        document.getElementById('hi').innerText = `Hello, ${currentUser.username}`;
        if(currentUser.role === 'admin') {
            document.getElementById('adm-btn').classList.remove('hidden');
            loadUsers();
        }
        loadRecipients();
        listenMessages();
    }

    function tab(name) {
        document.querySelectorAll('.tab').forEach(x => x.classList.add('hidden'));
        document.getElementById(name + '-tab').classList.remove('hidden');
    }

    // Cloud Chat
    function send() {
        const txt = document.getElementById('m-in').value;
        const to = document.getElementById('target').value;
        if(!txt) return;
        db.ref('chats').push({
            from: currentUser.username,
            to: to,
            msg: txt,
            ts: Date.now()
        });
        document.getElementById('m-in').value = "";
    }

    function listenMessages() {
        db.ref('chats').on('value', (snap) => {
            const win = document.getElementById('chat-win');
            win.innerHTML = "";
            snap.forEach(child => {
                const c = child.val();
                if(c.to === 'All' || c.to === currentUser.username || c.from === currentUser.username) {
                    const d = document.createElement('div');
                    d.className = `msg ${c.from === currentUser.username ? 'sent' : 'recv'}`;
                    d.innerHTML = `<small style="font-size:9px; display:block">${c.from} ➔ ${c.to}</small>${c.msg}`;
                    win.appendChild(d);
                }
            });
            win.scrollTop = win.scrollHeight;
        });
    }

    // Admin Functions
    function addUser() {
        const u = document.getElementById('nu').value, p = document.getElementById('np').value, r = document.getElementById('nr').value;
        if(u && p) db.ref('users').push({ username: u, password: p, role: r });
    }

    function loadUsers() {
        db.ref('users').on('value', (snap) => {
            const list = document.getElementById('u-list');
            list.innerHTML = "";
            snap.forEach(u => {
                list.innerHTML += `<div style="background:#eee; padding:5px; margin-bottom:5px; border-radius:5px">${u.val().username} (${u.val().role})</div>`;
            });
        });
    }

    function loadRecipients() {
        db.ref('users').on('value', (snap) => {
            const sel = document.getElementById('target');
            sel.innerHTML = '<option value="All">Everyone (Public)</option>';
            snap.forEach(u => {
                if(u.val().username !== currentUser.username) {
                    sel.innerHTML += `<option value="${u.val().username}">Private: ${u.val().username}</option>`;
                }
            });
        });
    }
</script>
</body>
</html>
