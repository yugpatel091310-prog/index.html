<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cloud Vault Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen" class="container">
        <div class="light-card">
            <h2 class="brand-title">Cloud Vault</h2>
            <p class="brand-subtitle">Please sign in to continue</p>
            <input type="text" id="login-username" placeholder="Username">
            
            <div class="password-row">
                <input type="password" id="login-password" placeholder="Password">
                <button type="button" onclick="toggleView()" id="eye-btn">👁️</button>
            </div>

            <button id="auth-btn" class="btn-blue" onclick="handleAuth()">Login</button>
            <p class="toggle-text">
                <span id="toggle-label">New here?</span> 
                <a href="#" id="toggle-link" onclick="toggleAuthMode()">Create Account</a>
            </p>
        </div>
    </div>

    <div id="chat-screen" class="container chat-layout" style="display:none;">
        <div class="header">
            <div class="user-meta">
                <div class="status-dot"></div>
                <h3><span id="user-tag"></span></h3>
            </div>
            
            <div class="header-btns">
                <button class="btn-vault" onclick="promptVaultAccess()">📁 Vault</button>
                <button id="admin-gate" class="btn-settings" style="display:none;" onclick="openAdmin()">⚙️</button>
                <button class="btn-red" onclick="logoutUser()">Logout</button>
            </div>
        </div>

        <div id="messages-display"></div>

        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Type a message..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <div id="vault-auth-modal" class="modal-overlay" style="display:none;">
        <div class="light-card modal-content">
            <h3>Locked Vault</h3>
            <input type="password" id="vault-pass-input" placeholder="Vault Password">
            <div class="modal-btns">
                <button class="btn-blue" onclick="verifyVaultPass()">Unlock</button>
                <button class="btn-gray" onclick="closeVaultModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div id="admin-screen" class="container" style="display:none;">
        <div class="light-card full-panel drive-ui">
            <div class="drive-header-row">
                <h3 style="color:#007bff; margin:0;">Cloud Storage</h3>
                <div id="admin-import-zone"></div>
            </div>
            
            <div class="file-labels">
                <span>Name</span>
                <span class="hide-mobile">Date</span>
                <span>Action</span>
            </div>
            <div id="vault-display" class="drive-list"></div>
            
            <div id="admin-only-section" style="display:none;">
                <div class="section-divider"></div>
                <h3 style="color:#007bff;">Manage Users</h3>
                <div id="user-registry"></div>
            </div>
            
            <button class="btn-gray" style="margin-top:20px;" onclick="closeAdmin()">← Back to Chat</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
