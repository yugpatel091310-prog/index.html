<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cloud Vault Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-theme">

    <div id="login-screen" class="container">
        <div class="white-card">
            <h2 class="ui-title">Cloud Vault</h2>
            <p class="ui-subtitle">Sign in to access your dashboard</p>
            <input type="text" id="login-username" placeholder="Username">
            <div class="password-row">
                <input type="password" id="login-password" placeholder="Password">
                <button type="button" onclick="toggleView()" id="eye-btn">👁️</button>
            </div>
            <button id="auth-btn" class="btn-blue" onclick="handleAuth()">Login</button>
        </div>
    </div>

    <div id="chat-screen" class="container" style="display:none;">
        <div class="white-card chat-layout">
            <div class="header">
                <div class="user-info">
                    <div class="online-indicator"></div>
                    <span id="user-tag" class="username-display"></span>
                </div>
                <div class="header-controls">
                    <button class="btn-icon" onclick="promptVaultAccess()">⚙️</button>
                    <button class="btn-red-sm" onclick="logoutUser()">Logout</button>
                </div>
            </div>
            <div id="messages-display"></div>
            <div class="input-area">
                <input type="text" id="msg-input" placeholder="Type a message..." onkeypress="if(event.key === 'Enter') sendMessage()">
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <div id="vault-auth-modal" class="modal-overlay" style="display:none;">
        <div class="white-card modal-content">
            <h3>Security Check</h3>
            <p>Enter Vault Access Code</p>
            <input type="password" id="vault-pass-input" placeholder="Code">
            <div class="modal-btns">
                <button class="btn-blue" onclick="verifyVaultPass()">Access</button>
                <button class="btn-gray" onclick="closeVaultModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div id="admin-screen" class="container" style="display:none;">
        <div class="white-card full-panel">
            <div class="panel-header">
                <h3 class="blue-text">Control Panel</h3>
                <div id="admin-import-zone"></div>
            </div>

            <div class="section scroll-v" style="flex: 1.5;">
                <h4 class="section-title">📁 File Vault</h4>
                <div id="vault-display" class="drive-list"></div>
            </div>

            <div class="section">
                <h4 class="section-title">🛠️ User Settings</h4>
                <button class="btn-gray-sm" onclick="changeMyPassword()">Update Password</button>
                <button class="btn-gray-sm" onclick="toggleTheme()">Switch Theme</button>
            </div>
            
            <div id="admin-only-section" style="display:none;">
                <div class="divider"></div>
                <h4 class="section-title">👥 Admin Console</h4>
                <button class="btn-blue-sm" onclick="addNewUser()">+ New User</button>
                <button class="btn-blue-sm" onclick="changeVaultPassword()">Change Vault Code</button>
                <div id="user-registry" class="scroll-v" style="max-height: 150px;"></div>
            </div>
            
            <button class="btn-gray" style="margin-top:15px" onclick="closeAdmin()">← Back to Chat</button>
        </div>
    </div>

    <div id="lightbox" class="modal-overlay" style="display:none;" onclick="this.style.display='none'">
        <img id="lightbox-img" src="" style="max-width:90%; max-height:80%; border-radius:12px;">
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
